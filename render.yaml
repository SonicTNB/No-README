services:
  - type: web
    name: tradingview-webhook-relay
    env: node
    region: oregon
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: WEBHOOK_SECRET
        sync: false
      - key: ALPACA_KEY
        sync: false
      - key: ALPACA_SECRET
        sync: false
